serverFiles:
  alerting_rules.yml:
    groups:
      - name: SelfHealingAlerts
        rules:
          - alert: HighCPUUsage
            expr: sum(rate(container_cpu_usage_seconds_total{namespace="default"}[5m])) by (pod) > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High CPU Usage on Pod"
              description: "Pod {{ $labels.pod }} is exceeding 80% CPU. HPA should currently be scaling up replicas."
          - alert: ContinuedPodRestarts
            expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod CrashLoop Detected"
              description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last 10 minutes. The Liveness Probe is forcefully terminating it."
