apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      imagePullSecrets:
      - name: ghcr-login
      containers:
      - name: nginx
        image: ghcr.io/perera1325/self-healing-platform:latest
        ports:
        - containerPort: 80
        env:
        - name: APP_COLOR
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: app-color
        # Production-grade Resource Limits & Requests
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        # Liveness Probe: Restarts the pod if it goes into a broken internal state
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
        # Readiness Probe: Removes the pod from the LoadBalancer if it can't serve traffic
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 3
