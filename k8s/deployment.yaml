apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: ${DOCKERHUB_USERNAME}/self-healing-platform:latest
        ports:
        - containerPort: 80
        env:
        - name: APP_COLOR
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: app-color
        # Simulated resources for HPA
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        # Liveness Probe: Restarts the pod if it goes into a broken internal state
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        # Readiness Probe: Removes the pod from the LoadBalancer if it can't serve traffic
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
